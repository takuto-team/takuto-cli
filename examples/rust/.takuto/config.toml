# Takuto — Rust project preset
#
# Copy this folder to your Takuto working directory and edit the values marked
# with ← to match your project. Secrets go in takuto.env, never here.
#
# What moved to the dashboard (NOT in this file anymore):
#   • Worktree init / install commands  → Configuration → Worktree Settings
#   • Run/stop dev-server buttons        → Configuration → Worktree Settings
#   • Dashboard login                    → create the admin account on first boot
#   • Per-provider model details         → Configuration → AI Settings (seeded below)
#   • Item-polling filters               → Configuration → Item Polling
#   • Repository to work on              → dashboard "Setup a New Project" button

# ── General ────────────────────────────────────────────────────────────────
[general]
ticketing_system = "github"            # ← "none", "github", or "jira"
auto_polling = true
poll_interval_secs = 60
pr_merge_poll_interval_secs = 60
max_concurrent_workflows = 1
max_active_workflows = 0                # 0 = mirror max_concurrent_workflows
log_level = "info"
# dry_mode = false                      # rehearse a workflow with no Jira/GitHub writes

# ── Git ──────────────────────────────────────────────────────────────────────
# The repository itself is cloned from the dashboard ("Setup a New Project").
[git]
base_branch = "main"                   # ← your default branch
remote = "origin"
repo_path = "/workspace"

# ── Web dashboard ──────────────────────────────────────────────────────────
# Multi-user: the initial admin account is created on the first-boot setup page.
[web]
host = "0.0.0.0"
port = 8080
# cors_origins = ["https://takuto.example.com"]   # set when behind a reverse proxy / TLS

# ── AI agent (deploy-time defaults; edit in Configuration → AI Settings) ─────
[agent]
provider = "claude"                    # "claude", "cursor", "codex", or "opencode"
step_timeout_secs = 1800

[agent.providers.claude]
# model = "claude-sonnet-4-6"          # ← empty/unset = automatic selection

# ── Jira (only needed if ticketing_system = "jira") ────────────────────────
[jira]
site = ""                              # ← e.g. "yourcompany.atlassian.net"
email = ""
project_keys = []
item_types = ["Task", "Bug"]
done_status = "Done"

# ── External database (optional) ─────────────────────────────────────────────
# Default is local SQLite. Point at Postgres/MySQL/MariaDB to centralise auth
# state. Can also be set via TAKUTO_DATABASE_CONNECTION in takuto.env.
# [database]
# connection = "postgres://takuto:s3cret@db.example:5432/takuto"

# ── Editor ─────────────────────────────────────────────────────────────────
[editor]
dynamic_ports = 10
# theme = "One Dark Pro"
# extensions = [
#   "rust-lang.rust-analyzer",
#   "tamasfe.even-better-toml",
#   "vadimcn.vscode-lldb",
# ]

# ── Network ────────────────────────────────────────────────────────────────
[network]
extra_egress_hosts = []
# allow_all_https = false
