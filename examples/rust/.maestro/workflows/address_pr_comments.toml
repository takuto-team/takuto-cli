# PR review loop. Becomes available after "Implement Ticket" completes
# (depends_on). Workflows are discovered automatically from this directory —
# no config.toml key needed.
#
# Placeholders: {pr_url}, {ticket_context}, {base_branch}

name = "Address PR Comments"
depends_on = ["implement_ticket"]

# ── Step 1: Fix review comments ──────────────────────────────────────────────
[[steps]]
name = "Fix review comments"
prompt = """
Pull request URL: {pr_url}

Ticket context:
{ticket_context}

Retrieve all unresolved PR review comments and feedback.
For each item: make the necessary code changes, verify the fix locally, commit with a descriptive
message, and push to the PR branch.
Do not bypass linting or tests while making fixes.
"""
repeat = 1

# ── Step 2: Lint and test ────────────────────────────────────────────────────
[[steps]]
name = "Lint and test"
prompt = """
Run your project's linting tool and fix all reported issues. Do not suppress warnings or add
ignore directives unless a rule is genuinely inapplicable; if so, leave an inline comment
explaining why. Re-run and confirm the linter exits clean with zero warnings before moving on.

Run your project's test suite and ensure all tests pass. If any tests fail, fix the underlying
code — do not delete or skip tests. Re-run until the full suite is green.

Run your project's formatter (if applicable) and apply any required formatting changes.

Once all checks pass cleanly, stage all changes and commit with a message of
`chore: fix lint warnings, format, and failing tests`.
"""
repeat = 1
