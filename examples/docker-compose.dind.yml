# Docker-in-Docker sidecar — adds workflow isolation
#
# Each workflow's install, agent, and run-command steps execute inside ephemeral
# Docker containers instead of directly on the Maestro host. This provides
# filesystem isolation, network namespace separation, and egress control.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dind.yml up -d
#
# The DinD sidecar runs a real Docker daemon. Maestro connects via DOCKER_HOST
# over the internal compose network. The `workspace` volume is shared so paths
# resolve identically from both containers.

services:
  dind:
    container_name: maestro-dind
    image: docker:27-dind
    privileged: true
    ports:
      # Worker container ports — mapped with an offset to avoid conflicts
      - "9200-9300:9100-9200"
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - workspace:/workspace
      - dind-storage:/var/lib/docker
      # Auth volumes shared with workers
      - claude-auth:/shared-auth/claude
      - cursor-auth:/shared-auth/cursor
      - gh-auth:/shared-auth/gh
      - acli-auth:/shared-auth/acli
      - npm-cache:/shared-auth/npm
      - mise-data:/shared-auth/mise-data
      - mise-cache:/shared-auth/mise-cache
      - aws-config:/shared-auth/aws
      - playwright-cache:/shared-auth/playwright-cache
      - vscode-data:/shared-auth/vscode
      # Config for worker egress rules
      - ./config.toml:/etc/maestro/config.toml:ro
      - ./workflows:/etc/maestro/workflows:ro
      - ./maestro.env:/etc/maestro/env:ro
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  maestro:
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - MAESTRO_DIND_PORT_OFFSET=100
    depends_on:
      dind:
        condition: service_healthy

volumes:
  dind-storage:
  vscode-data:
