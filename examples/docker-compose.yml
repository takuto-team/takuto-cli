# Maestro — basic Docker Compose setup
#
# Usage:
#   docker compose up -d
#   docker compose run --rm -it --network=host maestro setup   # first-time auth
#
# For workflow isolation (recommended), merge docker-compose.dind.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dind.yml up -d

services:
  maestro:
    image: ghcr.io/morphet81/maestro-releases:latest
    container_name: maestro
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    volumes:
      # Configuration (required)
      - ./config.toml:/etc/maestro/config.toml:ro
      # Custom workflow steps (optional — copy from examples/workflows/)
      - ./workflows:/etc/maestro/workflows:ro
      # Environment variables / secrets (optional)
      - ./maestro.env:/etc/maestro/env:ro
      # Persistent state
      - maestro-data:/home/maestro/.maestro
      - claude-auth:/home/maestro/.claude
      - cursor-auth:/home/maestro/.cursor
      - gh-auth:/home/maestro/.config/gh
      - acli-auth:/home/maestro/.config/acli
      # Workspace — your project is cloned here during setup
      - workspace:/workspace
      # Caches
      - npm-cache:/home/maestro/.npm
      - mise-data:/home/maestro/.local/share/mise
      - mise-cache:/home/maestro/.cache/mise
      - aws-config:/home/maestro/.aws
      - playwright-cache:/home/maestro/.cache/ms-playwright
    environment:
      - MAESTRO_CONFIG=/etc/maestro/config.toml
      - MAESTRO_HOME=/home/maestro
      - MAESTRO_DATA_DIR=/home/maestro/.maestro
      - CURSOR_CONFIG_DIR=/home/maestro/.cursor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  maestro-data:
  claude-auth:
  cursor-auth:
  gh-auth:
  acli-auth:
  workspace:
  npm-cache:
  mise-data:
  mise-cache:
  aws-config:
  playwright-cache:
